spring.application.name=OnetBundleHub

# ============================================================
#  DataBundlesHub — Spring Boot application configuration
#  All secrets MUST be supplied via environment variables.
#  Never commit real values to version control.
# ============================================================

management.endpoints.web.exposure.include=mappings,health,info



# ── Database ──────────────────────────────────────────────────
spring.datasource.url=${DB_URL:}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ───────────────────────────────────────────
# update = auto-create/alter tables to match entities (dev only)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
# dialect is auto-detected — no need to set explicitly

# ── Flyway ────────────────────────────────────────────────────
spring.flyway.enabled=false

# ── Jackson ───────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ── JWT ───────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:}
# Access token: 8 hours (was 15 min)
app.jwt.access-token-expiry-ms=${JWT_ACCESS_EXPIRY_MS:}

# Refresh token: 30 days (was 7 days)
app.jwt.refresh-token-expiry-ms=${JWT_REFRESH_EXPIRY_MS:2592000000}


# REQUIRED — paste your bh_live_... key here (or set env var BIGDREAMS_API_KEY)
bigdreams.api-key=${BIGDREAMS_API_KEY:bh_live_3cccbe46190d4bf8bf1b00d446e699b1}

# Optional — only override if the provider changes their endpoint URL
# bigdreams.base-url=https://qrzjkrkawcdoaggblvjc.supabase.co/functions/v1/developer-api


# ── CORS ──────────────────────────────────────────────────────
app.cors.allowed-origin=${APP_CORS_ORIGIN:http://localhost:3000}

# ── General app ───────────────────────────────────────────────
# ============================================================================
# App base URL — used ONLY for building customer-facing links that point at
# frontend routes (React Router), never at backend API endpoints:
#   - /a/{affiliateCode}   (AffiliateService, AffiliateRedirectController)
#   - /store/{slug}        (ResellerServiceImpl, ResellerStorefrontService)
#   - /ref/{slug}          (ResellerServiceImpl)
#
# These are all rendered by the React app (App.jsx), not by Spring — so this
# must point at the frontend origin, NOT the backend's own host:port.
#
# Local dev: Vite dev server default port is 5173.
# Production: set APP_BASE_URL to your real frontend domain via environment
# variable / deployment config — do NOT hardcode prod values here.
# ============================================================================
app.base-url=${APP_BASE_URL:https://www.databaygh.shop}
app.from-email=${APP_FROM_EMAIL:noreply@databundleshub.com}
app.from-name=${APP_FROM_NAME:DataBundlesHub}
app.reseller.min-payout-ghc=${MIN_PAYOUT_GHC:5.00}

# ── Paystack ──────────────────────────────────────────────────
# Replace placeholders with real keys in production via env vars
paystack.secret-key=${PAYSTACK_SECRET_KEY:}
paystack.public-key=${PAYSTACK_PUBLIC_KEY:}
paystack.base-url=https://api.paystack.co

# ── Databundleshub dealer API ─────────────────────────────────
dbh.base-url=${DBH_BASE_URL:https://databundleshub.com}

# ── SendGrid ──────────────────────────────────────────────────
# Leave blank to silently skip email notifications
sendgrid.api-key=${SENDGRID_API_KEY:}

# ── Arkesel SMS ───────────────────────────────────────────────
# Leave blank to silently skip SMS
arkesel.api-key=${ARKESEL_API_KEY:}

# ── Server ────────────────────────────────────────────────────
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always

# ── Logging ───────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.databundleHum=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ── Swagger / OpenAPI ──────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true

bestman.api-key=${BESTMAN_API_KEY:}
bestman.base-url=https://cleanheartsolutions.com/api
bestman.webhook-url=${BESTMAN_WEBHOOK_URL:}